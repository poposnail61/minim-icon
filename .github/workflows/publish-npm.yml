name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-minim-icon-react
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm run react:check
      - name: Publish minim-icon-react
        env:
          # Use an npm granular access token that can bypass 2FA for the first publish.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required to publish minim-icon-react." >&2
            exit 1
          fi
          npm publish --workspace=minim-icon-react --access public
